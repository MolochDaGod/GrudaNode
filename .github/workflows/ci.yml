name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: grudge-agent/package-lock.json

      - name: Install dependencies
        working-directory: grudge-agent
        run: npm ci --prefer-offline

      - name: Syntax check server
        working-directory: grudge-agent
        run: node --check server.js

      - name: Check package.json valid
        working-directory: grudge-agent
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json OK')"
