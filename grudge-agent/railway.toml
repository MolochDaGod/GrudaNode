[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "gruda-agent"

[services.variables]
PORT = "3200"
NODE_ENV = "production"
TREATY_CHAT_URL = "https://master.grudge-studio.com"
